# capture_config.yaml
# Zero-Touch Training — ERPNext Goods Receipt Capture Config
#
# Defines the navigation path and screenshot points for the standard
# Goods Receipt scenario (Purchase Order → Purchase Receipt).
#
# Run with: python capture_gr.py --config capture_config.yaml
#
# Output goes to:
#   poc/output/ui_trainer/standard_dry_gr/screens/
#   poc/output/ui_trainer/standard_dry_gr/screens_neutral/
#
# Both folders receive the same clean screenshots.
# The game engine overlays its own highlight/callout at runtime.

erpnext:
  base_url: "http://localhost:8080"
  username: "Administrator"
  password: "admin"           # change if you set a different password at first login

capture:
  # Output path relative to this config file's location (poc/capture/)
  output_dir: "../output/ui_trainer/standard_dry_gr"
  viewport:
    width: 1440
    height: 900
  # How long to wait (ms) for ERPNext's JS to settle after navigation/clicks
  settle_ms: 1200

  # Selector for the "Getting Started" popup close button — dismiss on every screen
  dismiss_popup_selector: ".getting-started .close, .modal .close, .widget .close"

# ─────────────────────────────────────────────────────────────────────────────
# SCREENS
# Each entry defines one screenshot in the sequence.
#
# Fields:
#   name        → output filename (no extension)
#   title       → human label used in logs
#   action      → what to do to reach this screen:
#                   navigate  — go to a URL
#                   click     — click a CSS selector
#                   fill      — fill a field then press Enter
#                   wait      — just wait settle_ms and screenshot
#   selector    → CSS selector for click/fill actions
#   value       → value for fill actions
#   url         → target URL for navigate actions
#                 Use {base_url} placeholder — replaced at runtime
#   scroll_to   → optional CSS selector to scroll into view before screenshot
#   highlight   → optional CSS selector to outline in amber before screenshot
#                 (painted on screens/ copy only; screens_neutral/ is clean)
# ─────────────────────────────────────────────────────────────────────────────

screens:

  # ── Step 1: Starting point — Buying workspace (has Purchase Orders link) ───
  - name: erpnext_home
    title: "ERPNext Buying Workspace"
    action: navigate
    url: "{base_url}/desk/buying"
    scroll_to: null
    highlight: null

  # ── Step 2: Purchase Order list ────────────────────────────────────────────
  - name: po_list
    title: "Purchase Order List"
    action: navigate
    url: "{base_url}/desk/purchase-order"
    scroll_to: null
    highlight: ".list-row:first-child"

  # ── Step 3: PO detail — target is the Create button ───────────────────────
  - name: po_detail
    title: "Purchase Order Detail"
    action: navigate
    url: "{base_url}/desk/purchase-order/{po_number}"
    scroll_to: null
    highlight: ".custom-actions .btn-primary, .page-actions .btn-primary"

  # ── Step 3→4 transition: click Create → Purchase Receipt ──────────────────
  #    This is an intermediate action step that creates the PR draft.
  #    It does NOT produce a screenshot — the script handles it as a
  #    "create_pr" action type (see capture_gr.py).
  - name: _create_pr
    title: "Click Create → Purchase Receipt (transition)"
    action: create_pr
    # No screenshot produced; just navigates to the new PR draft

  # ── Step 4: PR header — confirm Supplier and Date ─────────────────────────
  - name: pr_header
    title: "New Purchase Receipt — Header"
    action: wait
    scroll_to: null
    # Frappe wraps each field in .frappe-control[data-fieldname]; the visible
    # input sits inside .control-input-wrapper or .control-value, or there's
    # a .link-field wrapper.  Try broad-to-narrow.
    highlight: ".frappe-control[data-fieldname='supplier']"

  # ── Step 5: PR items table — verify Accepted Quantity ─────────────────────
  - name: pr_items
    title: "Purchase Receipt — Items Table"
    action: wait
    scroll_to: ".form-group[data-fieldname='items'], [data-fieldname='items']"
    # Target the first data row in the items grid
    highlight: ".rows .row-index:first-child, .frappe-control[data-fieldname='items'] .grid-row:first-child, .frappe-control[data-fieldname='items'] .rows .row:first-child"

  # ── Step 6: PR warehouse — set Accepted Warehouse ─────────────────────────
  - name: pr_warehouse
    title: "Purchase Receipt — Accepted Warehouse"
    action: wait
    scroll_to: ".frappe-control[data-fieldname='set_warehouse'], [data-fieldname='set_warehouse']"
    # The header-level "set_warehouse" field applies to all items at once
    highlight: ".frappe-control[data-fieldname='set_warehouse'], [data-fieldname='set_warehouse']"

  # ── Step 7: Save + Submit ─────────────────────────────────────────────────
  - name: pr_submit
    title: "Purchase Receipt — Ready to Submit"
    action: wait
    scroll_to: null
    # ERPNext uses .btn-primary-dark for the primary action (Save/Submit)
    highlight: ".primary-action, .btn-primary-dark, .page-actions .btn-primary"

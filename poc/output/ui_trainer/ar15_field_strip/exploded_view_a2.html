<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR-15 Exploded View — Extruded Silhouettes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #d0d8df; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #container { width: 100vw; height: 100vh; position: relative; }
  #info-panel {
    position: absolute; top: 0; right: 0; width: 320px; height: 100%;
    background: rgba(10, 10, 30, 0.92); border-left: 2px solid #f57c00;
    padding: 20px; color: #e0e0e0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  #info-panel h2 { color: #f57c00; font-size: 18px; margin-bottom: 4px; }
  #info-panel h3 { color: #ff9800; font-size: 14px; margin-top: 8px; }
  .step-item {
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.2s;
    font-size: 13px; line-height: 1.4;
  }
  .step-item:hover { border-color: #f57c00; background: rgba(245, 124, 0, 0.1); }
  .step-item.active { border-color: #ff9800; background: rgba(245, 124, 0, 0.2); }
  .step-num { color: #ff9800; font-weight: bold; margin-right: 6px; }
  .step-title { color: #fff; }
  .step-desc { color: #aaa; font-size: 11px; margin-top: 3px; }
  #controls {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(calc(-50% - 160px));
    display: flex; gap: 12px; align-items: center;
  }
  .btn {
    background: #f57c00; color: #fff; border: none; padding: 8px 18px;
    border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: background 0.2s;
  }
  .btn:hover { background: #e65100; }
  .btn.secondary { background: #37474f; }
  .btn.secondary:hover { background: #455a64; }
  #title-bar {
    position: absolute; top: 0; left: 0; right: 320px; height: 48px;
    background: rgba(55, 71, 79, 0.95); display: flex; align-items: center;
    padding: 0 20px; border-bottom: 2px solid #f57c00;
  }
  #title-bar span { color: #fff; font-size: 16px; font-weight: 600; }
  #title-bar .subtitle { color: #aaa; font-size: 12px; margin-left: 16px; }
  #hint {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(calc(-50% - 160px));
    color: #78909c; font-size: 12px;
  }
</style>
</head>
<body>
<div id="container">
  <div id="title-bar">
    <span>AR-15 Field Strip — Procedure Overview</span>
    <span class="subtitle">Click & drag to rotate · Scroll to zoom · Click a step to highlight</span>
  </div>
  <div id="info-panel">
    <h2>Field Strip Procedure</h2>
    <h3>8-Step Sequence</h3>
    <div id="step-list"></div>
  </div>
  <div id="controls">
    <button class="btn secondary" onclick="resetCamera()">Reset View</button>
    <button class="btn" onclick="toggleExplode()">Toggle Explode</button>
    <button class="btn" onclick="animateSequence()">Play Sequence</button>
  </div>
  <div id="hint">Click & drag to rotate · Scroll to zoom</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Colors ────────────────────────────────────────────────────────────
const STEEL = 0x8a8a8a;
const ALUMINUM = 0xa8a8a8;
const BLACK_ANODIZED = 0x505050;
const DARK_GRAY = 0x606060;
const RUBBER = 0x3a3a3a;
const BRASS = 0xd4a840;

const components = [];
let scene, camera, renderer, raycaster, mouse;
let isExploded = false;
let animating = false;
let activeStep = -1;

// ── Silhouette shape helpers ──────────────────────────────────────────
// All shapes are defined as 2D profiles (side view) traced from the
// reference diagram, then extruded along Z for thickness.

function shapeFromPoints(pts) {
  // pts: array of [x, y] pairs defining the outline
  const shape = new THREE.Shape();
  shape.moveTo(pts[0][0], pts[0][1]);
  for (let i = 1; i < pts.length; i++) {
    shape.lineTo(pts[i][0], pts[i][1]);
  }
  shape.closePath();
  return shape;
}

function extrudeShape(shape, depth, bevel) {
  const settings = {
    steps: 1,
    depth: depth,
    bevelEnabled: bevel !== false,
    bevelThickness: bevel ? (bevel.thickness || 0.04) : 0.04,
    bevelSize: bevel ? (bevel.size || 0.03) : 0.03,
    bevelSegments: 2,
  };
  return new THREE.ExtrudeGeometry(shape, settings);
}

// ── Component silhouette definitions ──────────────────────────────────
// Coordinates are in "model inches", traced from the parts diagram.
// The rifle lies along X (muzzle right, stock left), Y is up.

function createComponents() {
  const group = new THREE.Group();

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  BUTTSTOCK (Step 8 — Function Check)                        ║
  // ╚══════════════════════════════════════════════════════════════╝
  // Adjustable M4-style stock profile
  const stockShape = shapeFromPoints([
    [-1.8, -0.9],  // bottom-left
    [-1.6, -1.0],  // bottom dip
    [0.0, -1.0],   // bottom-right under tube socket
    [0.3, -0.7],   // tube socket bottom
    [0.3, -0.3],   // tube channel bottom
    [0.3, 0.3],    // tube channel top
    [0.3, 0.7],    // tube socket top
    [0.0, 1.0],    // top-right
    [-0.4, 1.0],   // top shoulder
    [-1.2, 0.7],   // top slope back
    [-1.7, 0.5],   // top-left curve
    [-2.0, 0.1],   // back top
    [-2.0, -0.3],  // back center
    [-1.9, -0.7],  // back bottom curve
  ]);
  const stockGeo = extrudeShape(stockShape, 1.0);
  stockGeo.translate(0, 0, -0.5); // center Z
  addPart('Buttstock', stockGeo, RUBBER,
    [-9.5, -0.5, 0], [-13.5, -0.5, 0], 8, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  BUFFER TUBE (Step 8)                                       ║
  // ╚══════════════════════════════════════════════════════════════╝
  // Simple cylinder kept as primitive — silhouettes don't add much for a tube
  const btGeo = new THREE.CylinderGeometry(0.45, 0.45, 5.5, 16);
  btGeo.rotateZ(Math.PI / 2);
  addPart('Buffer Tube', btGeo, ALUMINUM,
    [-6, -0.5, 0], [-9, -0.5, 0], 8, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  UPPER RECEIVER (Steps 3, 4, 7)                             ║
  // ╚══════════════════════════════════════════════════════════════╝
  // Flat-top receiver with picatinny rail, ejection port cut, forward assist bump
  const upperShape = shapeFromPoints([
    [-3.5, -0.6],  // bottom-left (rear)
    [3.5, -0.6],   // bottom-right (front, barrel thread area)
    [3.5, -0.2],   // front face bottom
    [3.5, 0.2],    // front face mid
    [3.5, 0.4],    // front face top
    [3.4, 0.45],   // tiny chamfer into rail
    // Picatinny rail top surface
    [3.3, 0.55],
    [2.8, 0.55],   // rail notch
    [2.7, 0.60],
    [2.5, 0.60],
    [2.4, 0.55],
    [2.0, 0.55],
    [1.9, 0.60],
    [1.7, 0.60],
    [1.6, 0.55],
    [1.2, 0.55],
    [1.1, 0.60],
    [0.9, 0.60],
    [0.8, 0.55],
    [0.4, 0.55],
    [0.3, 0.60],
    [0.1, 0.60],
    [0.0, 0.55],
    [-0.4, 0.55],
    [-0.5, 0.60],
    [-0.7, 0.60],
    [-0.8, 0.55],
    [-1.2, 0.55],
    [-1.3, 0.60],
    [-1.5, 0.60],
    [-1.6, 0.55],
    [-2.0, 0.55],
    [-2.1, 0.60],
    [-2.3, 0.60],
    [-2.4, 0.55],
    [-2.8, 0.55],
    [-2.9, 0.60],
    [-3.1, 0.60],
    [-3.2, 0.55],
    [-3.5, 0.50],  // rear of rail
    [-3.5, 0.0],   // rear face
  ]);
  const upperGeo = extrudeShape(upperShape, 1.3);
  upperGeo.translate(0, 0, -0.65); // center Z
  addPart('Upper Receiver', upperGeo, ALUMINUM,
    [0, 0.3, 0], [0, 2.5, 0], 3, group);

  // Shell deflector (bump on right side of upper)
  const sdGeo = new THREE.SphereGeometry(0.3, 8, 8, 0, Math.PI);
  addPart('Shell Deflector', sdGeo, ALUMINUM,
    [0.5, 0.5, 0.65], [0.5, 2.8, 1.8], 1, group);

  // Ejection port cover (thin plate)
  const epShape = shapeFromPoints([
    [0, 0], [1.3, 0], [1.3, 0.5], [0.1, 0.5], [0, 0.4]
  ]);
  const epGeo = extrudeShape(epShape, 0.06, { thickness: 0.01, size: 0.01 });
  addPart('Ejection Port Cover', epGeo, BLACK_ANODIZED,
    [0.4, -0.15, 0.63], [0.4, 0.8, 2.5], 1, group);

  // Forward assist
  const faShape = shapeFromPoints([
    [0, -0.15], [0.35, -0.15], [0.4, -0.1], [0.4, 0.1],
    [0.35, 0.15], [0, 0.15], [-0.05, 0.1], [-0.05, -0.1]
  ]);
  const faGeo = extrudeShape(faShape, 0.4, { thickness: 0.02, size: 0.02 });
  faGeo.rotateX(Math.PI / 2);
  addPart('Forward Assist', faGeo, BLACK_ANODIZED,
    [1.5, 0.5, 0.65], [1.5, 2.8, 2.0], 1, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  LOWER RECEIVER (Step 2 — Separation)                       ║
  // ╚══════════════════════════════════════════════════════════════╝
  // Lower with trigger pocket, magazine well, pivot pin holes
  const lowerShape = shapeFromPoints([
    [-3.0, 0.5],   // top-left (rear, meets upper)
    [2.5, 0.5],    // top-right (front, meets upper)
    [2.5, 0.2],    // front face top
    [2.3, -0.1],   // front slope into mag well area
    [2.0, -0.2],   // mag well front-top
    [2.0, -2.0],   // mag well front-bottom
    [1.8, -2.3],   // mag well bottom curve
    [1.0, -2.3],   // mag well bottom
    [0.8, -2.0],   // mag well rear-bottom
    [0.8, -1.0],   // trigger guard start
    // Trigger guard arc
    [0.7, -1.3],
    [0.5, -1.5],
    [0.2, -1.6],
    [-0.1, -1.5],
    [-0.3, -1.3],
    [-0.4, -1.0],  // trigger guard rear
    [-0.4, -0.5],  // trigger pocket rear
    [-0.6, -0.3],  // grip mounting area
    [-0.8, -0.2],  // behind grip
    [-1.5, -0.2],  // rear bottom
    [-2.0, -0.1],  // rear slope
    [-2.8, 0.0],   // buffer tube mount area bottom
    [-3.0, 0.1],   // rear face bottom
  ]);
  const lowerGeo = extrudeShape(lowerShape, 1.3);
  lowerGeo.translate(0, 0, -0.65); // center Z
  addPart('Lower Receiver', lowerGeo, ALUMINUM,
    [-0.5, -0.5, 0], [-0.5, -0.5, -3.0], 2, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  PISTOL GRIP (Step 8 — Function Check area)                 ║
  // ╚══════════════════════════════════════════════════════════════╝
  const gripShape = shapeFromPoints([
    [-0.1, 0.3],   // top-rear (attaches to receiver)
    [0.4, 0.3],    // top-front
    [0.5, 0.1],    // front top slope
    [0.55, -0.3],  // finger groove area
    [0.5, -0.8],   // front curve
    [0.45, -1.2],  // mid front
    [0.4, -1.6],   // lower front
    [0.35, -1.9],  // near bottom front
    [0.2, -2.1],   // bottom front curve
    [0.0, -2.2],   // very bottom
    [-0.2, -2.1],  // bottom rear curve
    [-0.35, -1.9], // near bottom rear
    [-0.4, -1.5],  // lower rear
    [-0.4, -1.0],  // mid rear
    [-0.35, -0.5], // rear curve
    [-0.2, -0.1],  // upper rear curve
    [-0.1, 0.1],   // meets receiver
  ]);
  const gripGeo = extrudeShape(gripShape, 1.0);
  gripGeo.translate(0, 0, -0.5);
  addPart('Pistol Grip', gripGeo, RUBBER,
    [-1.0, -1.5, 0], [-1.0, -1.5, -3.0], 8, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  TRIGGER (Step 8)                                           ║
  // ╚══════════════════════════════════════════════════════════════╝
  const trigShape = shapeFromPoints([
    [-0.06, 0.0],  // top
    [0.06, 0.0],
    [0.08, -0.2],  // blade
    [0.10, -0.5],
    [0.06, -0.6],
    [-0.06, -0.6],
    [-0.10, -0.5],
    [-0.08, -0.2],
  ]);
  const trigGeo = extrudeShape(trigShape, 0.25, { thickness: 0.01, size: 0.01 });
  trigGeo.translate(0, 0, -0.125);
  addPart('Trigger', trigGeo, BLACK_ANODIZED,
    [0.2, -1.1, 0], [0.2, -1.1, -3.0], 8, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  MAGAZINE (Step 1 — Verify Clear)                           ║
  // ╚══════════════════════════════════════════════════════════════╝
  // Curved STANAG magazine profile
  const magShape = shapeFromPoints([
    [-0.45, 0.0],  // top-left
    [0.45, 0.0],   // top-right
    [0.42, -0.8],  // right side slight taper
    [0.38, -1.8],  // right side more taper
    [0.33, -2.8],  // right side near bottom
    [0.25, -3.2],  // right curve to bottom
    [0.10, -3.4],  // bottom-right
    [-0.10, -3.4], // bottom-left
    [-0.25, -3.2], // left curve from bottom
    [-0.33, -2.8], // left side near bottom
    [-0.38, -1.8], // left side more taper
    [-0.42, -0.8], // left side slight taper
  ]);
  const magGeo = extrudeShape(magShape, 0.8);
  magGeo.translate(0, 0, -0.4);
  addPart('Magazine', magGeo, BLACK_ANODIZED,
    [1.2, -1.5, 0], [1.2, -1.5, -4.0], 1, group);

  // Magazine release button (keep simple)
  const magRelGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.15, 8);
  magRelGeo.rotateX(Math.PI / 2);
  addPart('Mag Release', magRelGeo, BLACK_ANODIZED,
    [1.8, 0.0, 0.66], [1.8, 0.0, -2.3], 1, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  HANDGUARD (Step 5 — Inspect & Clean area)                  ║
  // ╚══════════════════════════════════════════════════════════════╝
  // M-LOK style free-float handguard — octagonal cross-section profile
  const hgShape = shapeFromPoints([
    [0.0, -0.7],   // bottom-left
    [10.0, -0.65],  // bottom-right (slight taper)
    [10.0, -0.55],
    [10.2, -0.45],  // front lip
    [10.2, 0.45],
    [10.0, 0.55],
    [10.0, 0.65],   // top-right
    // M-LOK slots along top
    [9.5, 0.65],
    [9.5, 0.72], [9.0, 0.72], [9.0, 0.65],  // slot
    [8.2, 0.65],
    [8.2, 0.72], [7.7, 0.72], [7.7, 0.65],  // slot
    [6.9, 0.65],
    [6.9, 0.72], [6.4, 0.72], [6.4, 0.65],  // slot
    [5.6, 0.65],
    [5.6, 0.72], [5.1, 0.72], [5.1, 0.65],  // slot
    [4.3, 0.65],
    [4.3, 0.72], [3.8, 0.72], [3.8, 0.65],  // slot
    [3.0, 0.65],
    [3.0, 0.72], [2.5, 0.72], [2.5, 0.65],  // slot
    [1.5, 0.65],
    [1.5, 0.72], [1.0, 0.72], [1.0, 0.65],  // slot
    [0.0, 0.7],    // top-left
  ]);
  // Cut out the center bore (for barrel clearance)
  const hgHole = new THREE.Path();
  hgHole.moveTo(0.3, -0.4);
  hgHole.lineTo(9.7, -0.4);
  hgHole.lineTo(9.7, 0.4);
  hgHole.lineTo(0.3, 0.4);
  hgHole.closePath();
  hgShape.holes = [hgHole];

  const hgGeo = extrudeShape(hgShape, 1.2);
  hgGeo.translate(0, 0, -0.6);
  addPart('Handguard', hgGeo, BLACK_ANODIZED,
    [3.0, 0.3, 0], [6.0, 0.3, 2.5], 5, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  BARREL + MUZZLE BRAKE (Step 5)                             ║
  // ╚══════════════════════════════════════════════════════════════╝
  // Barrel profile — thicker at the chamber end, tapers to muzzle
  const barrelShape = shapeFromPoints([
    [0.0, -0.3],   // chamber end bottom
    [4.0, -0.3],   // mid section
    [4.5, -0.28],  // begin taper
    [10.0, -0.22], // gas block area
    [13.0, -0.20], // muzzle end
    [13.0, 0.20],
    [10.0, 0.22],
    [4.5, 0.28],
    [4.0, 0.3],
    [0.0, 0.3],
  ]);
  const barrelGeo = extrudeShape(barrelShape, 0.5, { thickness: 0.02, size: 0.02 });
  barrelGeo.translate(0, 0, -0.25);
  addPart('Barrel', barrelGeo, STEEL,
    [3.5, 0.3, 0], [9.0, 0.3, 0], 5, group);

  // Muzzle brake — pronged / birdcage profile
  const muzzleShape = shapeFromPoints([
    [0.0, -0.22],  // meets barrel
    [0.1, -0.35],  // step out
    [0.3, -0.35],
    // Prong cuts
    [0.4, -0.30], [0.5, -0.35], [0.6, -0.30],
    [0.7, -0.35], [0.8, -0.30], [0.9, -0.35],
    [1.0, -0.30],
    [1.1, -0.25],  // tip
    [1.2, -0.10],  // top of tip
    [1.2, 0.10],
    [1.1, 0.25],
    [1.0, 0.30],
    [0.9, 0.35], [0.8, 0.30], [0.7, 0.35],
    [0.6, 0.30], [0.5, 0.35], [0.4, 0.30],
    [0.3, 0.35],
    [0.1, 0.35],
    [0.0, 0.22],
  ]);
  const muzzleGeo = extrudeShape(muzzleShape, 0.5, { thickness: 0.02, size: 0.02 });
  muzzleGeo.translate(0, 0, -0.25);
  addPart('Muzzle Brake', muzzleGeo, DARK_GRAY,
    [16.5, 0.3, 0], [22, 0.3, 0], 5, group);

  // Gas tube (thin — keep as cylinder)
  const gasGeo = new THREE.CylinderGeometry(0.06, 0.06, 8, 8);
  gasGeo.rotateZ(Math.PI / 2);
  addPart('Gas Tube', gasGeo, STEEL,
    [6, 0.9, 0], [12, 1.8, 0], 5, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  FRONT SIGHT (Step 5)                                       ║
  // ╚══════════════════════════════════════════════════════════════╝
  // A-frame / triangular front sight tower
  const fsShape = shapeFromPoints([
    [-0.25, 0.0],  // base left
    [0.25, 0.0],   // base right
    [0.20, 0.2],
    [0.12, 0.6],   // right side slope
    [0.08, 0.8],   // near top right
    [0.04, 0.95],  // sight post right
    [0.02, 1.1],   // tip
    [-0.02, 1.1],
    [-0.04, 0.95],
    [-0.08, 0.8],
    [-0.12, 0.6],
    [-0.20, 0.2],
  ]);
  const fsGeo = extrudeShape(fsShape, 0.15, { thickness: 0.01, size: 0.01 });
  fsGeo.translate(0, 0, -0.075);
  addPart('Front Sight', fsGeo, BLACK_ANODIZED,
    [13.5, 0.9, 0], [19, 2.0, 0], 5, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  BOLT CARRIER GROUP (Steps 3, 4, 6, 7)                     ║
  // ╚══════════════════════════════════════════════════════════════╝
  // BCG side profile — cylindrical body with gas key on top, bolt face at front
  const bcgShape = shapeFromPoints([
    [-2.8, -0.30],  // rear bottom
    [2.2, -0.30],   // front bottom
    [2.4, -0.28],   // bolt chamfer
    [2.6, -0.20],   // bolt face taper
    [2.7, -0.10],   // bolt face
    [2.7, 0.10],
    [2.6, 0.20],
    [2.4, 0.28],
    [2.2, 0.30],    // front top
    // Gas key bump
    [0.8, 0.30],
    [0.7, 0.45],    // gas key rise
    [0.5, 0.48],
    [-0.5, 0.48],
    [-0.7, 0.45],
    [-0.8, 0.30],   // gas key end
    [-2.8, 0.30],   // rear top
    [-2.8, 0.15],   // rear face top
    [-2.9, 0.05],   // buffer contact
    [-2.9, -0.05],
    [-2.8, -0.15],  // rear face bottom
  ]);
  const bcgGeo = extrudeShape(bcgShape, 0.6);
  bcgGeo.translate(0, 0, -0.3);
  addPart('Bolt Carrier Group', bcgGeo, STEEL,
    [0, 0.3, 0], [0, 5.0, 0], 4, group);

  // Cam pin (small — keep as cylinder)
  const cpGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6);
  addPart('Cam Pin', cpGeo, STEEL,
    [1.5, 0.3, 0], [3.0, 7.5, 1.0], 4, group);

  // Firing pin (thin rod — keep as cylinder)
  const fpGeo = new THREE.CylinderGeometry(0.04, 0.04, 4.5, 6);
  fpGeo.rotateZ(Math.PI / 2);
  addPart('Firing Pin', fpGeo, STEEL,
    [0, 0.3, 0], [0, 8.0, 0], 4, group);

  // Firing pin retaining pin (tiny — keep as cylinder)
  const rpGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6);
  rpGeo.rotateX(Math.PI / 2);
  addPart('Retaining Pin', rpGeo, BRASS,
    [-2.2, 0.3, 0], [-2.2, 8.5, 1.5], 4, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  CHARGING HANDLE (Step 3)                                   ║
  // ╚══════════════════════════════════════════════════════════════╝
  // T-shaped handle — long spine with latch at rear
  const chShape = shapeFromPoints([
    [-1.5, -0.08],  // rear-bottom of spine
    [1.5, -0.08],   // front-bottom
    [1.5, 0.08],    // front-top
    [-1.0, 0.08],   // top of spine before latch
    [-1.0, 0.18],   // latch rises
    [-1.2, 0.22],   // latch bump
    [-1.6, 0.22],
    [-1.8, 0.18],   // latch end
    [-1.8, -0.18],  // latch bottom
    [-1.6, -0.22],
    [-1.2, -0.22],
    [-1.0, -0.18],
    [-1.0, -0.08],
    [-1.5, -0.08],
  ]);
  const chGeo = extrudeShape(chShape, 0.6, { thickness: 0.02, size: 0.02 });
  chGeo.translate(0, 0, -0.3);
  addPart('Charging Handle', chGeo, ALUMINUM,
    [-2, 0.85, 0], [-2, 4.0, -2.5], 3, group);

  // ╔══════════════════════════════════════════════════════════════╗
  // ║  TAKEDOWN PINS (Step 2)                                     ║
  // ╚══════════════════════════════════════════════════════════════╝
  // Small cylinders — silhouettes wouldn't help here
  const pinGeo = new THREE.CylinderGeometry(0.09, 0.09, 1.4, 8);
  pinGeo.rotateX(Math.PI / 2);
  addPart('Rear Takedown Pin', pinGeo, STEEL,
    [-2.5, 0.0, 0], [-2.5, 0.0, -4.5], 2, group);

  const pin2Geo = new THREE.CylinderGeometry(0.09, 0.09, 1.4, 8);
  pin2Geo.rotateX(Math.PI / 2);
  addPart('Front Pivot Pin', pin2Geo, STEEL,
    [2.0, 0.0, 0], [2.0, 0.0, -4.5], 2, group);

  // Safety selector (keep simple)
  const safetyGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 8);
  safetyGeo.rotateX(Math.PI / 2);
  addPart('Safety Selector', safetyGeo, BLACK_ANODIZED,
    [-1.5, -0.2, 0.66], [-1.5, -0.2, -2.3], 8, group);

  // Bolt catch (small lever)
  const bcatchShape = shapeFromPoints([
    [0, 0], [0.15, 0], [0.15, 0.5], [0.1, 0.6], [0.05, 0.6], [0, 0.5]
  ]);
  const bcatchGeo = extrudeShape(bcatchShape, 0.08, { thickness: 0.01, size: 0.01 });
  addPart('Bolt Catch', bcatchGeo, BLACK_ANODIZED,
    [1.0, -0.2, -0.66], [1.0, -0.2, -3.7], 1, group);

  scene.add(group);
  group.rotation.y = -0.3;
  return group;
}

function addPart(name, geometry, color, assembledPos, explodedPos, step, parent) {
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    metalness: 0.35,
    roughness: 0.45,
  });
  const mesh = new THREE.Mesh(geometry, mat);
  mesh.position.set(...assembledPos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);

  components.push({
    name, mesh, step,
    assembledPos: new THREE.Vector3(...assembledPos),
    explodedPos: new THREE.Vector3(...explodedPos),
    originalColor: color,
  });
}

// ── Step definitions ──────────────────────────────────────────────────
const STEPS = [
  { num: 1, title: 'Verify Clear',       desc: 'Remove mag, lock bolt, inspect chamber' },
  { num: 2, title: 'Takedown Pins',      desc: 'Push rear then front pin, separate receivers' },
  { num: 3, title: 'Remove BCG',         desc: 'Pull charging handle, slide BCG out' },
  { num: 4, title: 'Disassemble Bolt',   desc: 'Ret. pin → firing pin → cam pin → bolt' },
  { num: 5, title: 'Inspect & Clean',    desc: 'Check bolt face, lugs, gas rings for wear' },
  { num: 6, title: 'Lubricate',          desc: 'CLP on carrier rails, cam slot, bolt body' },
  { num: 7, title: 'Reassemble BCG',     desc: 'Bolt → cam pin → firing pin → ret. pin' },
  { num: 8, title: 'Function Check',     desc: 'Rejoin receivers, pins home, test trigger/safety' },
];

// ── Scene setup ───────────────────────────────────────────────────────
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xd0d8df);
  scene.fog = new THREE.Fog(0xd0d8df, 35, 70);

  camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 0.1, 100);
  camera.position.set(12, 8, 18);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth - 320, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('container').insertBefore(renderer.domElement, document.getElementById('info-panel'));

  // Lights — studio setup
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const key = new THREE.DirectionalLight(0xffffff, 1.0);
  key.position.set(10, 15, 10);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xd0d8ff, 0.6);
  fill.position.set(-8, 5, -5);
  scene.add(fill);

  const back = new THREE.DirectionalLight(0xffffff, 0.4);
  back.position.set(0, 8, -12);
  scene.add(back);

  const rim = new THREE.PointLight(0xf57c00, 0.3, 30);
  rim.position.set(-5, 3, 12);
  scene.add(rim);

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(40, 40);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0xb8c0c8, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -6;
  ground.receiveShadow = true;
  scene.add(ground);

  const grid = new THREE.GridHelper(30, 30, 0x9aa0a8, 0xb0b8c0);
  grid.position.y = -5.95;
  scene.add(grid);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  createComponents();
  buildStepList();
  setupOrbitControls();

  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('click', onModelClick);

  animate();
}

// ── Manual orbit controls ─────────────────────────────────────────────
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical = { theta: -0.6, phi: 1.1, radius: 24 };

function setupOrbitControls() {
  const el = renderer.domElement;
  el.addEventListener('mousedown', (e) => {
    isDragging = true;
    prevMouse = { x: e.clientX, y: e.clientY };
  });
  el.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = (e.clientX - prevMouse.x) * 0.008;
    const dy = (e.clientY - prevMouse.y) * 0.008;
    spherical.theta -= dx;
    spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi - dy));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCameraFromSpherical();
  });
  el.addEventListener('mouseup', () => isDragging = false);
  el.addEventListener('mouseleave', () => isDragging = false);
  el.addEventListener('wheel', (e) => {
    spherical.radius = Math.max(8, Math.min(40, spherical.radius + e.deltaY * 0.02));
    updateCameraFromSpherical();
    e.preventDefault();
  }, { passive: false });
  updateCameraFromSpherical();
}

function updateCameraFromSpherical() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.lookAt(0, 0, 0);
}

// ── Interaction ───────────────────────────────────────────────────────
function onModelClick(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const meshes = components.map(c => c.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length > 0) {
    const comp = components.find(c => c.mesh === hits[0].object);
    if (comp) highlightStep(comp.step);
  }
}

function highlightStep(stepNum) {
  activeStep = (activeStep === stepNum) ? -1 : stepNum;
  components.forEach(c => {
    if (activeStep === -1 || c.step === activeStep) {
      c.mesh.material.color.setHex(c.originalColor);
      c.mesh.material.emissive.setHex(c.step === activeStep ? 0x331800 : 0x000000);
      c.mesh.material.opacity = 1;
      c.mesh.material.transparent = false;
    } else {
      c.mesh.material.color.setHex(c.originalColor);
      c.mesh.material.emissive.setHex(0x000000);
      c.mesh.material.opacity = 0.15;
      c.mesh.material.transparent = true;
    }
  });
  document.querySelectorAll('.step-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.step) === activeStep);
  });
}

// ── Explode / collapse animation ──────────────────────────────────────
function toggleExplode() {
  if (animating) return;
  isExploded = !isExploded;
  animating = true;
  const start = Date.now();
  const duration = 1200;
  function tick() {
    const t = Math.min((Date.now() - start) / duration, 1);
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    components.forEach(c => {
      const from = isExploded ? c.assembledPos : c.explodedPos;
      const to = isExploded ? c.explodedPos : c.assembledPos;
      c.mesh.position.lerpVectors(from, to, ease);
    });
    if (t < 1) requestAnimationFrame(tick);
    else animating = false;
  }
  tick();
}

function animateSequence() {
  if (animating) return;
  if (!isExploded) { toggleExplode(); setTimeout(animateSequence, 1400); return; }
  let stepIdx = 0;
  function nextStep() {
    if (stepIdx > 8) { highlightStep(-1); return; }
    if (stepIdx === 0) highlightStep(-1);
    else highlightStep(stepIdx);
    stepIdx++;
    setTimeout(nextStep, 1500);
  }
  nextStep();
}

function resetCamera() {
  spherical = { theta: -0.6, phi: 1.1, radius: 24 };
  updateCameraFromSpherical();
  highlightStep(-1);
  if (isExploded) toggleExplode();
}

// ── Step list panel ───────────────────────────────────────────────────
function buildStepList() {
  const list = document.getElementById('step-list');
  STEPS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.dataset.step = s.num;
    div.innerHTML = `<span class="step-num">${s.num}.</span><span class="step-title">${s.title}</span><div class="step-desc">${s.desc}</div>`;
    div.addEventListener('click', () => highlightStep(s.num));
    list.appendChild(div);
  });
}

// ── Render loop ───────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

function onResize() {
  const w = window.innerWidth - 320;
  camera.aspect = w / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(w, window.innerHeight);
}

init();
</script>

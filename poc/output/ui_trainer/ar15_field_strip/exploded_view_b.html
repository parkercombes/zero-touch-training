<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR-15 Exploded View — Option B (2.5D Layered Diagram)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #e8ecf0; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #container { width: 100vw; height: 100vh; position: relative; }
  #info-panel {
    position: absolute; top: 0; right: 0; width: 320px; height: 100%;
    background: rgba(10, 10, 30, 0.92); border-left: 2px solid #f57c00;
    padding: 20px; color: #e0e0e0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px; z-index: 10;
  }
  #info-panel h2 { color: #f57c00; font-size: 18px; margin-bottom: 4px; }
  #info-panel h3 { color: #ff9800; font-size: 14px; margin-top: 8px; }
  .step-item {
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.2s;
    font-size: 13px; line-height: 1.4;
  }
  .step-item:hover { border-color: #f57c00; background: rgba(245, 124, 0, 0.1); }
  .step-item.active { border-color: #ff9800; background: rgba(245, 124, 0, 0.2); }
  .step-num { color: #ff9800; font-weight: bold; margin-right: 6px; }
  .step-title { color: #fff; }
  .step-desc { color: #aaa; font-size: 11px; margin-top: 3px; }
  #controls {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(calc(-50% - 160px));
    display: flex; gap: 12px; align-items: center; z-index: 10;
  }
  .btn {
    background: #f57c00; color: #fff; border: none; padding: 8px 18px;
    border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .btn:hover { background: #e65100; }
  .btn.secondary { background: #37474f; }
  .btn.secondary:hover { background: #455a64; }
  #title-bar {
    position: absolute; top: 0; left: 0; right: 320px; height: 48px;
    background: rgba(55, 71, 79, 0.95); display: flex; align-items: center;
    padding: 0 20px; border-bottom: 2px solid #f57c00; z-index: 10;
  }
  #title-bar span { color: #fff; font-size: 16px; font-weight: 600; }
  #title-bar .subtitle { color: #aaa; font-size: 12px; margin-left: 16px; }
  #canvas3d { position: absolute; top: 0; left: 0; }
</style>
</head>
<body>
<div id="container">
  <div id="title-bar">
    <span>AR-15 Field Strip — Procedure Overview</span>
    <span class="subtitle">Click & drag to orbit · Scroll to zoom · Click a step to highlight</span>
  </div>
  <div id="info-panel">
    <h2>Field Strip Procedure</h2>
    <h3>8-Step Sequence</h3>
    <div id="step-list"></div>
  </div>
  <div id="controls">
    <button class="btn secondary" onclick="resetView()">Reset View</button>
    <button class="btn" onclick="toggleExplode()">Toggle Explode</button>
    <button class="btn" onclick="playSequence()">Play Sequence</button>
  </div>
</div>

const STEPS = [
  { num: 1, title: 'Verify Clear',       desc: 'Remove mag, lock bolt, inspect chamber' },
  { num: 2, title: 'Takedown Pins',      desc: 'Push rear then front pin, separate receivers' },
  { num: 3, title: 'Remove BCG',         desc: 'Pull charging handle, slide BCG out' },
  { num: 4, title: 'Disassemble Bolt',   desc: 'Ret. pin \u2192 firing pin \u2192 cam pin \u2192 bolt' },
  { num: 5, title: 'Inspect & Clean',    desc: 'Check bolt face, lugs, gas rings for wear' },
  { num: 6, title: 'Lubricate',          desc: 'CLP on carrier rails, cam slot, bolt body' },
  { num: 7, title: 'Reassemble BCG',     desc: 'Bolt \u2192 cam pin \u2192 firing pin \u2192 ret. pin' },
  { num: 8, title: 'Function Check',     desc: 'Rejoin receivers, pins home, test trigger/safety' },
];

let scene, camera, renderer, raycaster, mouse;
let layers = [];
let isExploded = false;
let animatingFlag = false;
let activeStep = -1;
let isDragging = false, prevMouse = { x: 0, y: 0 };
let orbit = { rotX: 0, rotY: 0, zoom: 1 };

const BASE_W = 1280, BASE_H = 720;
const SCALE = 0.012;
const EXPLODE_MULTIPLIER = 3.5;

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xe8ecf0);

  const viewW = window.innerWidth - 320;
  camera = new THREE.PerspectiveCamera(40, viewW / window.innerHeight, 0.1, 100);
  camera.position.set(0, 0, 22);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(viewW, window.innerHeight);
  renderer.domElement.id = 'canvas3d';
  document.getElementById('container').insertBefore(renderer.domElement, document.getElementById('info-panel'));

  scene.add(new THREE.AmbientLight(0xffffff, 0.9));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
  dirLight.position.set(5, 5, 10);
  scene.add(dirLight);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  const group = new THREE.Group();
  let loaded = 0;
  const entries = Object.entries(LAYER_DATA);
  const total = entries.length;

  entries.forEach(([name, info]) => {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      canvas.width = info.width;
      canvas.height = info.height;
      canvas.getContext('2d').drawImage(img, 0, 0);

      const texture = new THREE.CanvasTexture(canvas);
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;

      const planeW = info.width * SCALE;
      const planeH = info.height * SCALE;
      const geo = new THREE.PlaneGeometry(planeW, planeH);
      const mat = new THREE.MeshBasicMaterial({
        map: texture, transparent: true,
        side: THREE.DoubleSide, depthWrite: true,
      });

      const mesh = new THREE.Mesh(geo, mat);
      const cx = (info.cropX + info.width / 2 - BASE_W / 2) * SCALE;
      const cy = -(info.cropY + info.height / 2 - BASE_H / 2) * SCALE;
      const z = info.z * 0.15;
      mesh.position.set(cx, cy, z);
      group.add(mesh);

      layers.push({
        name, mesh, step: info.step, label: info.label,
        assembledPos: new THREE.Vector3(cx, cy, z),
        explodedPos: new THREE.Vector3(cx, cy, info.z * EXPLODE_MULTIPLIER * 0.3),
      });

      loaded++;
      if (loaded === total) {
        scene.add(group);
        setupControls();
        buildStepList();
        animate();
      }
    };
    img.src = 'data:image/png;base64,' + info.data;
  });

  window.addEventListener('resize', onResize);
}

function setupControls() {
  const el = renderer.domElement;
  el.addEventListener('mousedown', (e) => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
  el.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    orbit.rotY += (e.clientX - prevMouse.x) * 0.005;
    orbit.rotX += (e.clientY - prevMouse.y) * 0.005;
    orbit.rotX = Math.max(-0.8, Math.min(0.8, orbit.rotX));
    orbit.rotY = Math.max(-1.2, Math.min(1.2, orbit.rotY));
    prevMouse = { x: e.clientX, y: e.clientY };
    applyOrbit();
  });
  el.addEventListener('mouseup', () => isDragging = false);
  el.addEventListener('mouseleave', () => isDragging = false);
  el.addEventListener('wheel', (e) => {
    orbit.zoom = Math.max(0.4, Math.min(2.5, orbit.zoom - e.deltaY * 0.001));
    applyOrbit(); e.preventDefault();
  }, { passive: false });
  el.addEventListener('click', onClick);
}

function applyOrbit() {
  const dist = 22 / orbit.zoom;
  camera.position.set(
    dist * Math.sin(orbit.rotY) * Math.cos(orbit.rotX),
    dist * Math.sin(orbit.rotX),
    dist * Math.cos(orbit.rotY) * Math.cos(orbit.rotX)
  );
  camera.lookAt(0, 0, 0);
}

function onClick(e) {
  if (Math.abs(e.clientX - prevMouse.x) > 5 || Math.abs(e.clientY - prevMouse.y) > 5) return;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(layers.map(l => l.mesh));
  if (hits.length > 0) {
    const layer = layers.find(l => l.mesh === hits[0].object);
    if (layer) highlightStep(layer.step);
  }
}

function highlightStep(stepNum) {
  activeStep = (activeStep === stepNum) ? -1 : stepNum;
  layers.forEach(l => {
    l.mesh.material.opacity = (activeStep === -1 || l.step === activeStep) ? 1 : 0.15;
  });
  document.querySelectorAll('.step-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.step) === activeStep);
  });
}

function toggleExplode() {
  if (animatingFlag) return;
  isExploded = !isExploded;
  animatingFlag = true;
  const start = Date.now(), dur = 1000;
  function tick() {
    const t = Math.min((Date.now() - start) / dur, 1);
    const ease = t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;
    layers.forEach(l => {
      const from = isExploded ? l.assembledPos : l.explodedPos;
      const to = isExploded ? l.explodedPos : l.assembledPos;
      l.mesh.position.lerpVectors(from, to, ease);
    });
    if (t < 1) requestAnimationFrame(tick);
    else animatingFlag = false;
  }
  tick();
}

function playSequence() {
  if (animatingFlag) return;
  if (!isExploded) { toggleExplode(); setTimeout(playSequence, 1200); return; }
  let idx = 0;
  function next() {
    if (idx > 8) { highlightStep(-1); return; }
    highlightStep(idx === 0 ? -1 : idx);
    idx++;
    setTimeout(next, 1500);
  }
  next();
}

function resetView() {
  orbit = { rotX: 0, rotY: 0, zoom: 1 };
  applyOrbit();
  highlightStep(-1);
  if (isExploded) toggleExplode();
}

function buildStepList() {
  const list = document.getElementById('step-list');
  STEPS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.dataset.step = s.num;
    div.innerHTML = `<span class="step-num">${s.num}.</span><span class="step-title">${s.title}</span><div class="step-desc">${s.desc}</div>`;
    div.addEventListener('click', () => highlightStep(s.num));
    list.appendChild(div);
  });
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

function onResize() {
  const w = window.innerWidth - 320;
  camera.aspect = w / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(w, window.innerHeight);
}

init();
</script>

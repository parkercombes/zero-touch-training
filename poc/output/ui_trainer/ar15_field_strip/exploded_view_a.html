<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AR-15 Exploded View — Option A (Programmatic Primitives)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #d0d8df; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  #container { width: 100vw; height: 100vh; position: relative; }
  #info-panel {
    position: absolute; top: 0; right: 0; width: 320px; height: 100%;
    background: rgba(10, 10, 30, 0.92); border-left: 2px solid #f57c00;
    padding: 20px; color: #e0e0e0; overflow-y: auto;
    display: flex; flex-direction: column; gap: 12px;
  }
  #info-panel h2 { color: #f57c00; font-size: 18px; margin-bottom: 4px; }
  #info-panel h3 { color: #ff9800; font-size: 14px; margin-top: 8px; }
  .step-item {
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    border: 1px solid transparent; transition: all 0.2s;
    font-size: 13px; line-height: 1.4;
  }
  .step-item:hover { border-color: #f57c00; background: rgba(245, 124, 0, 0.1); }
  .step-item.active { border-color: #ff9800; background: rgba(245, 124, 0, 0.2); }
  .step-num { color: #ff9800; font-weight: bold; margin-right: 6px; }
  .step-title { color: #fff; }
  .step-desc { color: #aaa; font-size: 11px; margin-top: 3px; }
  #controls {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(calc(-50% - 160px));
    display: flex; gap: 12px; align-items: center;
  }
  .btn {
    background: #f57c00; color: #fff; border: none; padding: 8px 18px;
    border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
    transition: background 0.2s;
  }
  .btn:hover { background: #e65100; }
  .btn.secondary { background: #37474f; }
  .btn.secondary:hover { background: #455a64; }
  #title-bar {
    position: absolute; top: 0; left: 0; right: 320px; height: 48px;
    background: rgba(55, 71, 79, 0.95); display: flex; align-items: center;
    padding: 0 20px; border-bottom: 2px solid #f57c00;
  }
  #title-bar span { color: #fff; font-size: 16px; font-weight: 600; }
  #title-bar .subtitle { color: #aaa; font-size: 12px; margin-left: 16px; }
  #hint {
    position: absolute; bottom: 60px; left: 50%;
    transform: translateX(calc(-50% - 160px));
    color: #78909c; font-size: 12px;
  }
</style>
</head>
<body>
<div id="container">
  <div id="title-bar">
    <span>AR-15 Field Strip — Procedure Overview</span>
    <span class="subtitle">Click & drag to rotate · Scroll to zoom · Click a step to highlight</span>
  </div>
  <div id="info-panel">
    <h2>Field Strip Procedure</h2>
    <h3>8-Step Sequence</h3>
    <div id="step-list"></div>
  </div>
  <div id="controls">
    <button class="btn secondary" onclick="resetCamera()">Reset View</button>
    <button class="btn" onclick="toggleExplode()">Toggle Explode</button>
    <button class="btn" onclick="animateSequence()">Play Sequence</button>
  </div>
  <div id="hint">Click & drag to rotate · Scroll to zoom</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── Component definitions ──────────────────────────────────────────────
// All dimensions in approximate inches, centered on origin
// Each component: { name, geometry, color, assembledPos, explodedPos, step }

const STEEL = 0x8a8a8a;
const ALUMINUM = 0xa8a8a8;
const BLACK_ANODIZED = 0x505050;
const DARK_GRAY = 0x606060;
const ORANGE_HL = 0xff9800;
const RUBBER = 0x3a3a3a;
const BRASS = 0xd4a840;
const GREEN_LUBE = 0x4caf50;

const components = [];
let scene, camera, renderer, raycaster, mouse;
let isExploded = false;
let animating = false;
let activeStep = -1;

// ── Build the rifle components ────────────────────────────────────────

function createComponents() {
  const group = new THREE.Group();

  // === BARREL GROUP (Step 5 area - inspection) ===
  // Barrel
  const barrelGeo = new THREE.CylinderGeometry(0.28, 0.28, 16, 16);
  barrelGeo.rotateZ(Math.PI / 2);
  addPart('Barrel', barrelGeo, STEEL,
    [8, 0.3, 0], [14, 0.3, 0], 5, group);

  // Muzzle brake
  const muzzleGeo = new THREE.CylinderGeometry(0.4, 0.35, 1.5, 8);
  muzzleGeo.rotateZ(Math.PI / 2);
  addPart('Muzzle Brake', muzzleGeo, DARK_GRAY,
    [16.5, 0.3, 0], [22, 0.3, 0], 5, group);

  // Gas tube (thin tube above barrel)
  const gasGeo = new THREE.CylinderGeometry(0.06, 0.06, 8, 8);
  gasGeo.rotateZ(Math.PI / 2);
  addPart('Gas Tube', gasGeo, STEEL,
    [6, 0.9, 0], [12, 1.8, 0], 5, group);

  // Handguard (M-LOK style - octagonal-ish tube)
  const hgOuter = new THREE.CylinderGeometry(0.9, 0.9, 10, 8);
  const hgInner = new THREE.CylinderGeometry(0.7, 0.7, 10.1, 8);
  hgOuter.rotateZ(Math.PI / 2);
  hgInner.rotateZ(Math.PI / 2);
  addPart('Handguard', hgOuter, BLACK_ANODIZED,
    [7, 0.3, 0], [12, 0.3, 2.5], 5, group);

  // Front sight post
  const fsGeo = new THREE.BoxGeometry(0.15, 1.2, 0.15);
  addPart('Front Sight', fsGeo, BLACK_ANODIZED,
    [13.5, 1.1, 0], [19, 2.2, 0], 5, group);

  // === UPPER RECEIVER (Steps 3, 4, 7 — BCG removal/reassembly area) ===
  const upperGeo = new THREE.BoxGeometry(7, 1.2, 1.3);
  addPart('Upper Receiver', upperGeo, ALUMINUM,
    [0, 0.3, 0], [0, 2.5, 0], 3, group);

  // Flat top rail
  const railGeo = new THREE.BoxGeometry(7, 0.15, 0.8);
  addPart('Picatinny Rail', railGeo, BLACK_ANODIZED,
    [0, 0.95, 0], [0, 3.3, 0], 3, group);

  // Forward assist (small cylinder on right side)
  const faGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.4, 8);
  faGeo.rotateX(Math.PI / 2);
  addPart('Forward Assist', faGeo, BLACK_ANODIZED,
    [1.5, 0.5, 0.7], [1.5, 2.8, 2.0], 1, group);

  // Shell deflector (bump behind ejection port)
  const sdGeo = new THREE.SphereGeometry(0.3, 8, 8, 0, Math.PI);
  addPart('Shell Deflector', sdGeo, ALUMINUM,
    [0.5, 0.5, 0.65], [0.5, 2.8, 1.8], 1, group);

  // Ejection port cover (thin plate)
  const epGeo = new THREE.BoxGeometry(1.2, 0.05, 0.6);
  addPart('Ejection Port Cover', epGeo, BLACK_ANODIZED,
    [1.0, -0.05, 0.65], [1.0, 0.8, 2.5], 1, group);

  // === BOLT CARRIER GROUP (Steps 3, 4, 6, 7) ===
  // Bolt carrier (main cylinder)
  const bcGeo = new THREE.CylinderGeometry(0.35, 0.35, 5.5, 12);
  bcGeo.rotateZ(Math.PI / 2);
  addPart('Bolt Carrier', bcGeo, STEEL,
    [0, 0.3, 0], [0, 5.0, 0], 4, group);

  // Bolt (front of BCG)
  const boltGeo = new THREE.CylinderGeometry(0.3, 0.3, 1.2, 8);
  boltGeo.rotateZ(Math.PI / 2);
  addPart('Bolt', boltGeo, STEEL,
    [3.2, 0.3, 0], [5.5, 6.5, 0], 4, group);

  // Gas key (on top of carrier)
  const gkGeo = new THREE.BoxGeometry(1.5, 0.25, 0.2);
  addPart('Gas Key', gkGeo, STEEL,
    [-0.5, 0.68, 0], [-0.5, 5.4, 0], 4, group);

  // Cam pin (small cylinder)
  const cpGeo = new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6);
  addPart('Cam Pin', cpGeo, STEEL,
    [2.0, 0.3, 0], [3.0, 7.5, 1.0], 4, group);

  // Firing pin (long thin rod)
  const fpGeo = new THREE.CylinderGeometry(0.04, 0.04, 4.5, 6);
  fpGeo.rotateZ(Math.PI / 2);
  addPart('Firing Pin', fpGeo, STEEL,
    [0, 0.3, 0], [0, 8.0, 0], 4, group);

  // Firing pin retaining pin (tiny cross-pin)
  const rpGeo = new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6);
  rpGeo.rotateX(Math.PI / 2);
  addPart('Retaining Pin', rpGeo, BRASS,
    [-2.2, 0.3, 0], [-2.2, 8.5, 1.5], 4, group);

  // === CHARGING HANDLE (Step 3) ===
  const chBaseGeo = new THREE.BoxGeometry(3, 0.2, 0.15);
  addPart('CH Body', chBaseGeo, ALUMINUM,
    [-2, 0.9, 0], [-2, 4.0, -2.5], 3, group);
  const chLatchGeo = new THREE.BoxGeometry(0.8, 0.3, 0.6);
  addPart('CH Latch', chLatchGeo, BLACK_ANODIZED,
    [-3.4, 0.9, 0], [-3.4, 4.0, -2.5], 3, group);

  // === LOWER RECEIVER (Step 2 — separation point) ===
  const lowerGeo = new THREE.BoxGeometry(5.5, 2.2, 1.3);
  addPart('Lower Receiver', lowerGeo, ALUMINUM,
    [-0.5, -1.5, 0], [-0.5, -1.5, -3.0], 2, group);

  // Trigger guard
  const tgGeo = new THREE.TorusGeometry(0.6, 0.08, 6, 12, Math.PI);
  tgGeo.rotateY(Math.PI / 2);
  addPart('Trigger Guard', tgGeo, BLACK_ANODIZED,
    [0.5, -2.6, 0], [0.5, -2.6, -3.0], 8, group);

  // Trigger
  const trigGeo = new THREE.BoxGeometry(0.1, 0.7, 0.3);
  addPart('Trigger', trigGeo, BLACK_ANODIZED,
    [0.5, -2.0, 0], [0.5, -2.0, -3.0], 8, group);

  // Magazine well (box below lower)
  const magWellGeo = new THREE.BoxGeometry(1.0, 1.5, 1.0);
  addPart('Magazine Well', magWellGeo, ALUMINUM,
    [1.0, -2.8, 0], [1.0, -2.8, -3.0], 1, group);

  // Magazine release button
  const magRelGeo = new THREE.CylinderGeometry(0.12, 0.12, 0.15, 8);
  magRelGeo.rotateX(Math.PI / 2);
  addPart('Mag Release', magRelGeo, BLACK_ANODIZED,
    [1.8, -0.8, 0.66], [1.8, -0.8, -2.3], 1, group);

  // Pistol grip
  const pgGeo = new THREE.BoxGeometry(0.9, 2.5, 1.1);
  addPart('Pistol Grip', pgGeo, RUBBER,
    [-0.5, -3.5, 0], [-0.5, -3.5, -3.0], 8, group);

  // === TAKEDOWN PINS (Step 2) ===
  const pinGeo = new THREE.CylinderGeometry(0.08, 0.08, 1.4, 8);
  pinGeo.rotateX(Math.PI / 2);
  addPart('Rear Takedown Pin', pinGeo, STEEL,
    [-2.5, -0.5, 0], [-2.5, -0.5, -4.5], 2, group);

  const pin2Geo = pinGeo.clone();
  addPart('Front Pivot Pin', pin2Geo, STEEL,
    [2.0, -0.5, 0], [2.0, -0.5, -4.5], 2, group);

  // === BUFFER TUBE & STOCK (Step 8 area) ===
  const btGeo = new THREE.CylinderGeometry(0.45, 0.45, 6, 12);
  btGeo.rotateZ(Math.PI / 2);
  addPart('Buffer Tube', btGeo, ALUMINUM,
    [-6, -0.5, 0], [-9, -0.5, 0], 8, group);

  // Stock (buttstock)
  const stockGeo = new THREE.BoxGeometry(3.5, 1.8, 1.0);
  addPart('Buttstock', stockGeo, RUBBER,
    [-9, -0.5, 0], [-13, -0.5, 0], 8, group);

  // Safety selector
  const safetyGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.1, 8);
  safetyGeo.rotateX(Math.PI / 2);
  addPart('Safety Selector', safetyGeo, BLACK_ANODIZED,
    [-1.5, -0.8, 0.66], [-1.5, -0.8, -2.3], 8, group);

  // Bolt catch (left side)
  const bcatchGeo = new THREE.BoxGeometry(0.15, 0.5, 0.08);
  addPart('Bolt Catch', bcatchGeo, BLACK_ANODIZED,
    [1.0, -0.4, -0.66], [1.0, -0.4, -3.7], 1, group);

  scene.add(group);
  group.rotation.y = -0.3;
  return group;
}

function addPart(name, geometry, color, assembledPos, explodedPos, step, parent) {
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    metalness: 0.3,
    roughness: 0.5,
  });
  const mesh = new THREE.Mesh(geometry, mat);
  mesh.position.set(...assembledPos);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  parent.add(mesh);

  components.push({
    name, mesh, step,
    assembledPos: new THREE.Vector3(...assembledPos),
    explodedPos: new THREE.Vector3(...explodedPos),
    originalColor: color,
  });
}

// ── Step definitions ──────────────────────────────────────────────────
const STEPS = [
  { num: 1, title: 'Verify Clear',       desc: 'Remove mag, lock bolt, inspect chamber' },
  { num: 2, title: 'Takedown Pins',      desc: 'Push rear then front pin, separate receivers' },
  { num: 3, title: 'Remove BCG',         desc: 'Pull charging handle, slide BCG out' },
  { num: 4, title: 'Disassemble Bolt',   desc: 'Ret. pin → firing pin → cam pin → bolt' },
  { num: 5, title: 'Inspect & Clean',    desc: 'Check bolt face, lugs, gas rings for wear' },
  { num: 6, title: 'Lubricate',          desc: 'CLP on carrier rails, cam slot, bolt body' },
  { num: 7, title: 'Reassemble BCG',     desc: 'Bolt → cam pin → firing pin → ret. pin' },
  { num: 8, title: 'Function Check',     desc: 'Rejoin receivers, pins home, test trigger/safety' },
];

// ── Scene setup ───────────────────────────────────────────────────────
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0xd0d8df);
  scene.fog = new THREE.Fog(0xd0d8df, 35, 70);

  camera = new THREE.PerspectiveCamera(45, (window.innerWidth - 320) / window.innerHeight, 0.1, 100);
  camera.position.set(12, 8, 18);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth - 320, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.getElementById('container').insertBefore(renderer.domElement, document.getElementById('info-panel'));

  // Lights — bright studio setup for visibility
  const ambient = new THREE.AmbientLight(0xffffff, 0.7);
  scene.add(ambient);

  const key = new THREE.DirectionalLight(0xffffff, 1.0);
  key.position.set(10, 15, 10);
  key.castShadow = true;
  key.shadow.mapSize.set(2048, 2048);
  scene.add(key);

  const fill = new THREE.DirectionalLight(0xd0d8ff, 0.6);
  fill.position.set(-8, 5, -5);
  scene.add(fill);

  const back = new THREE.DirectionalLight(0xffffff, 0.4);
  back.position.set(0, 8, -12);
  scene.add(back);

  const rim = new THREE.PointLight(0xf57c00, 0.3, 30);
  rim.position.set(-5, 3, 12);
  scene.add(rim);

  // Ground plane
  const groundGeo = new THREE.PlaneGeometry(40, 40);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0xb8c0c8, roughness: 0.9 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.y = -6;
  ground.receiveShadow = true;
  scene.add(ground);

  // Grid helper
  const grid = new THREE.GridHelper(30, 30, 0x9aa0a8, 0xb0b8c0);
  grid.position.y = -5.95;
  scene.add(grid);

  raycaster = new THREE.Raycaster();
  mouse = new THREE.Vector2();

  createComponents();
  buildStepList();

  // Simple orbit controls (manual implementation since OrbitControls isn't in r128 base)
  setupOrbitControls();

  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('click', onModelClick);

  animate();
}

// ── Manual orbit controls ─────────────────────────────────────────────
let isDragging = false, prevMouse = { x: 0, y: 0 };
let spherical = { theta: -0.6, phi: 1.1, radius: 24 };

function setupOrbitControls() {
  const el = renderer.domElement;

  el.addEventListener('mousedown', (e) => {
    isDragging = true;
    prevMouse = { x: e.clientX, y: e.clientY };
  });

  el.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    const dx = (e.clientX - prevMouse.x) * 0.008;
    const dy = (e.clientY - prevMouse.y) * 0.008;
    spherical.theta -= dx;
    spherical.phi = Math.max(0.2, Math.min(Math.PI - 0.2, spherical.phi - dy));
    prevMouse = { x: e.clientX, y: e.clientY };
    updateCameraFromSpherical();
  });

  el.addEventListener('mouseup', () => isDragging = false);
  el.addEventListener('mouseleave', () => isDragging = false);

  el.addEventListener('wheel', (e) => {
    spherical.radius = Math.max(8, Math.min(40, spherical.radius + e.deltaY * 0.02));
    updateCameraFromSpherical();
    e.preventDefault();
  }, { passive: false });

  updateCameraFromSpherical();
}

function updateCameraFromSpherical() {
  camera.position.x = spherical.radius * Math.sin(spherical.phi) * Math.cos(spherical.theta);
  camera.position.y = spherical.radius * Math.cos(spherical.phi);
  camera.position.z = spherical.radius * Math.sin(spherical.phi) * Math.sin(spherical.theta);
  camera.lookAt(0, 0, 0);
}

// ── Interaction ───────────────────────────────────────────────────────
function onModelClick(e) {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const meshes = components.map(c => c.mesh);
  const hits = raycaster.intersectObjects(meshes);
  if (hits.length > 0) {
    const comp = components.find(c => c.mesh === hits[0].object);
    if (comp) highlightStep(comp.step);
  }
}

function highlightStep(stepNum) {
  activeStep = (activeStep === stepNum) ? -1 : stepNum;

  components.forEach(c => {
    if (activeStep === -1 || c.step === activeStep) {
      c.mesh.material.color.setHex(c.originalColor);
      c.mesh.material.emissive.setHex(c.step === activeStep ? 0x331800 : 0x000000);
      c.mesh.material.opacity = 1;
      c.mesh.material.transparent = false;
    } else {
      c.mesh.material.color.setHex(c.originalColor);
      c.mesh.material.emissive.setHex(0x000000);
      c.mesh.material.opacity = 0.15;
      c.mesh.material.transparent = true;
    }
  });

  // Update panel
  document.querySelectorAll('.step-item').forEach(el => {
    el.classList.toggle('active', parseInt(el.dataset.step) === activeStep);
  });
}

// ── Explode / collapse animation ──────────────────────────────────────
function toggleExplode() {
  if (animating) return;
  isExploded = !isExploded;
  animating = true;

  const start = Date.now();
  const duration = 1200;

  function tick() {
    const t = Math.min((Date.now() - start) / duration, 1);
    const ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; // easeInOutCubic

    components.forEach(c => {
      const from = isExploded ? c.assembledPos : c.explodedPos;
      const to = isExploded ? c.explodedPos : c.assembledPos;
      c.mesh.position.lerpVectors(from, to, ease);
    });

    if (t < 1) {
      requestAnimationFrame(tick);
    } else {
      animating = false;
    }
  }
  tick();
}

function animateSequence() {
  if (animating) return;

  // If not exploded, explode first then run sequence
  if (!isExploded) {
    toggleExplode();
    setTimeout(animateSequence, 1400);
    return;
  }

  let stepIdx = 0;
  function nextStep() {
    if (stepIdx > 8) {
      highlightStep(-1); // clear
      return;
    }
    if (stepIdx === 0) {
      highlightStep(-1);
    } else {
      highlightStep(stepIdx);
    }
    stepIdx++;
    setTimeout(nextStep, 1500);
  }
  nextStep();
}

function resetCamera() {
  spherical = { theta: -0.6, phi: 1.1, radius: 24 };
  updateCameraFromSpherical();
  highlightStep(-1);
  if (isExploded) toggleExplode();
}

// ── Step list panel ───────────────────────────────────────────────────
function buildStepList() {
  const list = document.getElementById('step-list');
  STEPS.forEach(s => {
    const div = document.createElement('div');
    div.className = 'step-item';
    div.dataset.step = s.num;
    div.innerHTML = `<span class="step-num">${s.num}.</span><span class="step-title">${s.title}</span><div class="step-desc">${s.desc}</div>`;
    div.addEventListener('click', () => highlightStep(s.num));
    list.appendChild(div);
  });
}

// ── Render loop ───────────────────────────────────────────────────────
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

function onResize() {
  const w = window.innerWidth - 320;
  camera.aspect = w / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(w, window.innerHeight);
}

init();
</script>
</body>
</html>
